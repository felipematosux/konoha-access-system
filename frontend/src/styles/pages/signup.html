<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="../../assets/img/logo/favicon.png">
    <link rel="stylesheet" type="text/css" href="../global.css">
    <link rel="stylesheet" type="text/css" href="../signup.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Smooch+Sans:wght@100..900&display=swap" rel="stylesheet">
    <title>Sign Up - Felipe Dev</title>
</head>
<body>

    <header class="container_logo">
        <a href="../../../index.html">
            <img src="../../assets/img/logo/konohalogo.png" class="logo" alt="Konoha Access System Logo">
        </a>
    </header>

    <main>
        <div class="ge_info">
            <h2> General Information</h2>
            <form method="post" class="geform">
                    <select name="rank" class="rank">
                        <option value="" disabled selected>Rank</option>
                        <option value="Genin">Genin</option>
                        <option value="Chunin">Chunin</option>
                        <option value="Jonin">Jonin</option>
                        <option value="Anbu">Anbu</option>
                        <option value="Hokage">Hokage</option>
                    </select>

                    <br>

                    <input type="text" required placeholder="First Name" name="name" class="name">

                    <input type="text" required placeholder="Last Name" name="last name" class="lname">

                    <br>

                    <input type="name" required placeholder="Clan" class="clan">
           

                </div>
            </form>
        </div>
        <div class="ctc_details">

            <h2> Contact Details</h2>

            <form method="post" class="geform">
                
                <input type="text" name="address" required placeholder="Street + Nr" class="street">

                <br>

                <input type="text" name="address2" placeholder="Additional Information" class="adc">

                <br>

                <input type="number" name="Zip Code" required placeholder="Zip Code" maxlength="5" class="zipcode">

                <select name="Zone" required class="zone">
                        <option value="" disabled selected>Zone</option>
                        <option value="Hokage District">Hokage District</option>
                        <option value="Academy District">Academy District</option>
                        <option value="Residential District">Residential District</option>
                        <option value="Clan Districts">Clan Districts</option>
                        <option value="Commercial District">Commercial District</option>
                        <option value="Shinobi Operations District">Shinobi Operations District</option>
                        <option value="Medical District">Medical District</option>
                        <option value="Training Grounds Zone">Training Grounds Zone</option>
                    </select>

                    <br>

                    <input type="email" name="email" required placeholder="Your Ninja Email" class="email">

                    <br>

                    <input id="remember" type="checkbox">
                    <label for="remember" class="terms">I do Accept Konoha's <a href="">Terms and Conditions </a></label>

                    <br>

                    <input type="submit" value="Register" class="signin-button">
                
            </form>
        </div>

    </main>


    
</body>
</html>
